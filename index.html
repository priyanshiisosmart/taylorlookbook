<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:"Kirang Haerang",cursive;
background:white;
overflow-x:hidden;
cursor:none;
position:relative;

}

/* ---------- TITLE ---------- */

h1{

color:mediumvioletred;

font-size:52px;

padding:25px;

text-align:left;

margin-left:25px;

}

/* ---------- CURSOR ---------- */

.cursor-pic{

position:fixed;

width:65px;

height:65px;

pointer-events:none;

z-index:99999;

transform:translate(-50%,-50%);

}

/* ---------- ERA IMAGES ---------- */

.era-img{

width:300px;

height:300px;

object-fit:cover;

cursor:none;

}

.era-img-wrap{

display:inline-block;

position:relative;

margin:8px;

}

/* ---------- Album Labels ---------- */

.album-label{

display:none;

position:absolute;

top:50%;

right:-135px;

transform:translateY(-50%);

background:rgba(0,0,0,.55);

backdrop-filter:blur(5px);

padding:6px 14px;

border-radius:8px;

white-space:nowrap;

font-size:22px;

animation:fadeIn .25s;

}

.era-img-wrap:hover .album-label{

display:block;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(-50%) translateX(-8px);

}

to{

opacity:1;

transform:translateY(-50%) translateX(0);

}

}

/* ---------- POPUP ---------- */

.overlay{

display:none;

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

z-index:9998;

}

.overlay.active{

display:block;

}

.floating-title{

position:fixed;

pointer-events:none;

font-size:30px;

transform:translate(-50%,-120%);

z-index:9999;

text-shadow:0 0 20px white;

}

.close-hint{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

font-size:12px;

color:mediumvioletred;

opacity:.6;

}

/* ---------- BUTTERFLIES ---------- */

.butterfly{

position:fixed;

width:48px;

height:48px;

pointer-events:none;

z-index:7000;

}

.butterfly img{
width:100%;

height:100%;

user-select:none;

animation:flap .35s infinite alternate ease-in-out;

transform-origin:center;

}



@keyframes flap{

from{

transform:scaleY(1);

}

to{

transform:scaleY(.82);

}

}

/* ---------- GLITTER ---------- */

.sparkle{

position:fixed;

pointer-events:none;

border-radius:50%;

animation:sparkle .8s linear forwards;

z-index:9997;

}

@keyframes sparkle{

0%{

opacity:1;

transform:scale(.4) rotate(0deg);

}

50%{

opacity:1;

transform:scale(1.4) rotate(180deg);

}

100%{

opacity:0;

transform:scale(0) rotate(360deg);

}

}

/* ---------- DESKTOP TOOLBARS ---------- */

.toolbar{

position:fixed;

display:flex;

gap:10px;

padding:10px;

background:#fff0f6;

border:2px dashed mediumvioletred;

border-radius:15px;

z-index:1000;

}

#braceletBar{

top:20px;

right:20px;

}

#glitterBar{

top:90px;

right:20px;

}

/* ---------- Bracelet Buttons ---------- */

.bracelet-option{

display:flex;

flex-direction:column;

align-items:center;

font-size:10px;

cursor:none;

}

.bracelet-option img{

width:42px;

height:42px;

object-fit:cover;

border-radius:50%;

border:2px solid transparent;

transition:.2s;

}

.bracelet-option img:hover{

transform:scale(1.12);

border-color:mediumvioletred;

}

.bracelet-option img.selected{

border-color:mediumvioletred;

box-shadow:0 0 10px hotpink;

}

/* ---------- Glitter Buttons ---------- */

.color-btn{

width:32px;

height:32px;

border-radius:50%;

border:none;

cursor:pointer;

}

/* ---------- MOBILE ---------- */

.settings-button{

display:none;

position:fixed;

top:15px;

right:15px;

width:52px;

height:52px;

border-radius:50%;

background:white;

border:2px solid hotpink;

font-size:24px;

z-index:5000;

}

.mobile-toolbar{

display:none;

position:fixed;

top:75px;

right:12px;

background:white;

padding:12px;

border-radius:15px;

box-shadow:0 0 15px rgba(0,0,0,.2);

z-index:5000;

}

.mobile-toolbar.show{

display:block;

}

@media(max-width:768px){

h1{

font-size:28px;

margin-left:12px;

padding-top:18px;

padding-right:70px;

}

.era-img{

width:170px;

height:170px;

.toolbar{

display:none;

.settings-button{

display:block;

}

.cursor-pic{

width:45px;

height:45px;

}

.album-label{

display:none!important;

}

}
body{

-webkit-user-select:none;

}

}

body{

cursor:auto;

}

from{

<script>

/* ==========================
   CUSTOM CURSOR
========================== */

const follower = document.getElementById("follower");

document.addEventListener("mousemove",(e)=>{

    follower.style.left=e.clientX+"px";
    follower.style.top=e.clientY+"px";

});


/* ==========================
   BRACELETS
========================== */

function setCursor(clicked,src){

    document
    .querySelectorAll(".bracelet-option img")
    .forEach(img=>img.classList.remove("selected"));

    if(clicked.classList)
        clicked.classList.add("selected");

    follower.src=src;

    document
    .getElementById("mobileToolbar")
    .classList.remove("show");


}



/* ==========================
   POPUP
========================== */

let popupOpen=false;

function openPopup(e,title,font,color){

    e.stopPropagation();

    const popup=document.getElementById("overlay");
    const text=document.getElementById("floating-title");

    text.innerHTML=title;

    text.style.fontFamily=font;

    text.style.color=color;

    const rect=e.target.getBoundingClientRect();

    text.style.left=(rect.left+rect.width/2)+"px";

    text.style.top=(rect.top)+"px";

    popup.classList.add("active");

    popupOpen=true;

}

function closePopup(){

    popupOpen=false;

    document.getElementById("overlay").classList.remove("active");

}



/* ==========================
   MOBILE SETTINGS
========================== */

function toggleToolbar(){

    document
    .getElementById("mobileToolbar")
    .classList.toggle("show");

}



/* ==========================
   GLITTER COLORS
========================== */

let glitterColor="#ffffff";

function setGlitterColor(color){

    glitterColor=color;

    document
    .getElementById("mobileToolbar")
    .classList.remove("show");

}


/* ==========================
   GLITTER
========================== */

function sparkle(x,y){

    for(let i=0;i<8;i++){

        const star=document.createElement("div");

        star.className="glitter";

        const size=
       window.innerWidth<768
       ?16+Math.random()*10
       :10+Math.random()*12;erHTML="✦";

        

        star.style.fontSize=size+"px";

        star.style.color=glitterColor;

        star.style.left=x+"px";

        star.style.top=y+"px";

        star.style.textShadow=
        `
        0 0 6px white,
        0 0 12px ${glitterColor},
        0 0 22px ${glitterColor}
        `;

        star.style.setProperty("--tx",
        (Math.random()*70-35)+"px");

        star.style.setProperty("--ty",
        (Math.random()*70-35)+"px");

        document.body.appendChild(star);

        setTimeout(()=>{

            star.remove();

        },600);

    }

}


/* Desktop */

let sparkleTimer=0;

document.addEventListener("mousemove",(e)=>{

    if(Date.now()-sparkleTimer<25) return;

    sparkleTimer=Date.now();

    sparkle(e.clientX,e.clientY);

});


/* Mobile */

let touchSparkle=0;

document.addEventListener("touchmove",(e)=>{

    if(Date.now()-touchSparkle<35) return;

    touchSparkle=Date.now();

    const t=e.touches[0];

    sparkle(t.clientX,t.clientY);

},{passive:true});



/* ==========================
   BUTTERFLIES
========================== */

const butterflyImages=[

"https://www.image2url.com/r2/default/images/1782471017304-4bdf7140-c1d3-4047-a91c-e9be0ce13167.jpg",

"https://www.image2url.com/r2/default/images/1782471475997-1d011609-acf4-4342-977a-5a41b3a664f8.jpg"

];

const positions=[

[0.15,0.20],
[0.80,0.20],
[0.20,0.70],
[0.80,0.70]

];

for(let i=0;i<4;i++){

    const b=document.createElement("div");

    b.className="butterfly";

    b.innerHTML=`
    <img
    src="${butterflyImages[i%2]}"
    draggable="false">
    `;

    document.body.appendChild(b);

    flyButterfly(

        b,

        positions[i][0]*window.innerWidth,

        positions[i][1]*window.innerHeight

    );

}


function flyButterfly(el,x,y){

    let angle=Math.random()*Math.PI*2;

    let zig=0;

    function fly(){

        zig+=0.07;

        angle+=(Math.random()-0.5)*0.02;

        x+=Math.cos(angle)*1.5;

        y+=Math.sin(angle)*1.5;

        x+=Math.sin(zig)*1.2;

        y+=Math.cos(zig)*1.2;

        if(x<10||x>window.innerWidth-60){

            angle=Math.PI-angle;

        }

        if(y<10||y>window.innerHeight-60){

            angle=-angle;

        }

        el.style.left=x+"px";

        el.style.top=y+"px";

        el.style.transform=
        Math.cos(angle)<0
        ?"scaleX(-1)"
        :"scaleX(1)";

        requestAnimationFrame(fly);

    }

    fly();

}
