<style>
   .page-title{
    color: mediumvioletred;
    font-family: "Kirang Haerang", sans-serif;
    font-size: 55px;
    text-align: left;
    margin: 20px 0 20px 25px; /* top right bottom left */
    padding: 0;
}
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:"Kirang Haerang",sans-serif;
font-size:25px;

background:white;

overflow-x:hidden;

cursor:none;

}

/* -----------------------------
   CUSTOM CURSOR
------------------------------*/

.cursor-pic{

position:fixed;

width:70px;

pointer-events:none;
/* ===========================
   MOBILE RESPONSIVE
=========================== */

@media screen and (max-width:768px){

body{
    overflow-x:hidden;
    font-size:16px;
}

/* Title */
.page-title{
    font-size:28px;
    margin:15px;
    text-align:left;
}

/* Cursor bracelet */
.cursor-pic{
    width:45px;
}

/* Butterflies */
.butterfly{
    width:32px;
}

/* Bracelet menu */
.bracelet-sidebar{
    width:48px;
    gap:6px;
    padding:6px 0;
}

.bracelet-option img{
    width:28px;
    height:28px;
}

.bracelet-option span{
    font-size:6px;
}

/* Era Images */

.era-img{
    width:180px;
    height:180px;
}

/* Album labels */

.album-label{
    display:none;
}

/* Popup */

.floating-title{
    font-size:22px;
}

/* Marquee spacing */

marquee{
    margin-top:10px;
}

}
@media screen and (max-width:480px){

.page-title{
    font-size:22px;
}

.era-img{
    width:140px;
    height:140px;
}

.cursor-pic{
    width:38px;
}

.butterfly{
    width:28px;
}

.bracelet-sidebar{
    width:42px;
}

.bracelet-option img{
    width:24px;
    height:24px;
}

}

transform:translate(-50%,-50%);

z-index:99999;

}

/* -----------------------------
   BUTTERFLIES
------------------------------*/

.butterfly{

position:fixed;

width:46px;

height:46px;

pointer-events:none;

z-index:8000;

}

.butterfly img{

width:100%;

height:100%;

user-select:none;

animation:flap .35s infinite alternate ease-in-out;

transform-origin:center;

}

@keyframes flap{

from{

transform:scale(.92);

}

to{

transform:scale(1.08);

}

}

/* -----------------------------
   GLITTER
------------------------------*/

.glitter{

position:fixed;

pointer-events:none;

z-index:9998;

animation:glitter .55s forwards ease-out;

}

@keyframes glitter{

0%{

opacity:1;

transform:scale(1.5);

}

100%{

opacity:0;

transform:
translate(var(--tx),var(--ty))
scale(0)
rotate(180deg);

}

}

/* -----------------------------
   SIDEBAR
------------------------------*/

.bracelet-sidebar{

position:fixed;

top:0;

right:0;

width:58px;

padding:8px;

background:#fff0f6;

border-left:2px dashed mediumvioletred;

border-bottom:2px dashed mediumvioletred;

border-radius:0 0 0 12px;

display:flex;

flex-direction:column;

align-items:center;

gap:8px;

z-index:5000;

}

.bracelet-sidebar p{

font-size:8px;

color:mediumvioletred;

}

.bracelet-option{

display:flex;

flex-direction:column;

align-items:center;

gap:2px;

cursor:none;

}

.bracelet-option img{

width:34px;

height:34px;

border-radius:50%;

border:2px solid transparent;

transition:.2s;

object-fit:cover;

}

.bracelet-option img:hover{

transform:scale(1.15);

border-color:mediumvioletred;

}

.bracelet-option img.selected{

border-color:mediumvioletred;

box-shadow:0 0 8px mediumvioletred;

}

.bracelet-option span{

font-size:7px;

color:mediumvioletred;

}

/* -----------------------------
   ERA IMAGES
------------------------------*/

.era-img-wrap{

display:inline-block;

position:relative;

}

.era-img{

width:300px;

height:300px;

display:block;

cursor:none;

}

.album-label{

display:none;

position:absolute;

top:50%;

right:-135px;

transform:translateY(-50%);

width:120px;

padding:6px 14px;

background:rgba(0,0,0,.55);

backdrop-filter:blur(4px);

border-radius:8px;

text-align:center;

white-space:nowrap;

font-size:22px;

pointer-events:none;

animation:labelPop .25s;

}

.era-img-wrap:hover .album-label{

display:block;

}

@keyframes labelPop{

from{

opacity:0;

transform:translateY(-50%) translateX(-6px);

}

to{

opacity:1;

transform:translateY(-50%) translateX(0);

}

}
/* -----------------------------
   POPUP
------------------------------*/

.overlay{

display:none;

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

z-index:99990;

}

.overlay.active{

display:block;

}

.floating-title{

position:fixed;

transform:translate(-50%,-120%);

font-size:30px;

pointer-events:none;

text-shadow:
0 0 18px rgba(255,255,255,.9),
0 0 8px rgba(0,0,0,.5);

animation:titlePop .25s ease;

z-index:99995;

}

@keyframes titlePop{

from{

opacity:0;

transform:
translate(-50%,-100%)
scale(.8);

}

to{

opacity:1;

transform:
translate(-50%,-120%)
scale(1);

}

}

.close-hint{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

font-size:12px;

color:mediumvioletred;

opacity:.6;

pointer-events:none;

z-index:99995;

}

h1{

color:mediumvioletred;

text-align:center;

margin:20px;

font-size:60px;

}

marquee{

margin:18px 0;

}

<script>

// =====================
// CUSTOM CURSOR
// =====================

const follower = document.getElementById("follower");

document.addEventListener("mousemove",(e)=>{

    follower.style.left=e.clientX+"px";
    follower.style.top=e.clientY+"px";

});

function setCursor(img,src){

    document
    .querySelectorAll(".bracelet-option img")
    .forEach(i=>i.classList.remove("selected"));

    img.classList.add("selected");

    follower.src=src;

}

// =====================
// POPUP
// =====================

let popupOpen=false;

function openPopup(e,title,font,color){

    e.stopPropagation();

    if(popupOpen){

        closePopup();
        return;

    }

    const box=e.target.getBoundingClientRect();

    const t=document.getElementById("floating-title");

    t.innerHTML=title;

    t.style.fontFamily=font+",sans-serif";

    t.style.color=color;

    t.style.left=(box.left+box.width/2)+"px";

    t.style.top=box.top+"px";

    document
    .getElementById("overlay")
    .classList
    .add("active");

    popupOpen=true;

}

function closePopup(){

    document
    .getElementById("overlay")
    .classList
    .remove("active");

    popupOpen=false;

}

// =====================
// GLITTER
// =====================

const glitterColors=[
"#ffffff",
"#eeeeee",
"#d8d8d8",
"#cccccc",
"#f4f4ff"
];

let glitterInterval;

document.addEventListener("mouseover",(e)=>{

    if(!e.target.classList.contains("era-img")) return;

    clearInterval(glitterInterval);

    glitterInterval=setInterval(()=>{

        const rect=e.target.getBoundingClientRect();

        for(let i=0;i<5;i++){

            const g=document.createElement("div");

            g.className="glitter";

            const size=Math.random()*4+2;

            g.style.width=size+"px";
            g.style.height=size+"px";

            g.style.borderRadius="50%";

            g.style.background=
            glitterColors[
            Math.floor(Math.random()*glitterColors.length)
            ];

            g.style.left=
            rect.left+Math.random()*rect.width+"px";

            g.style.top=
            rect.top+Math.random()*rect.height+"px";

            g.style.boxShadow="0 0 6px white";

            g.style.setProperty("--tx",(Math.random()*20-10)+"px");

            g.style.setProperty("--ty",(Math.random()*20-10)+"px");

            document.body.appendChild(g);

            setTimeout(()=>g.remove(),550);

        }

    },70);

});

document.addEventListener("mouseout",(e)=>{

    if(e.target.classList.contains("era-img")){

        clearInterval(glitterInterval);

    }

});

// =====================
// BUTTERFLIES
// =====================

const butterflyImages=[

"https://www.image2url.com/r2/default/images/1782471017304-4bdf7140-c1d3-4047-a91c-e9be0ce13167.jpg",

"https://www.image2url.com/r2/default/images/1782471475997-1d011609-acf4-4342-977a-5a41b3a664f8.jpg"

];

const starts=[

[0.15,0.2],

[0.75,0.25],

[0.25,0.75],

[0.8,0.7]

];

for(let i=0;i<4;i++){

    const b=document.createElement("div");

    b.className="butterfly";

    b.innerHTML=
    `<img src="${butterflyImages[i%2]}" draggable="false">`;

    document.body.appendChild(b);

    flyButterfly(

        b,

        starts[i][0]*window.innerWidth,

        starts[i][1]*window.innerHeight,

        1+Math.random()*0.4

    );

}

function flyButterfly(el,x,y,m){

    let angle=Math.random()*Math.PI*2;

    let timer=0;

    let zig=0;

    const speed=(1+Math.random())*m;

    function animate(){

        timer++;

        zig+=0.08;

        angle+=(Math.random()-0.5)*0.03;

        if(timer>100){

            angle+=(Math.random()-0.5)*2.6;

            timer=0;

        }

        const dx=Math.cos(angle)*speed-Math.sin(angle)*Math.sin(zig)*3;

        const dy=Math.sin(angle)*speed+Math.cos(angle)*Math.sin(zig)*3;

        x+=dx;

        y+=dy;

        if(x<0){

            x=0;
            angle=Math.PI-angle;

        }

        if(x>window.innerWidth-50){

            x=window.innerWidth-50;
            angle=Math.PI-angle;

        }

        if(y<0){

            y=0;
            angle=-angle;

        }

        if(y>window.innerHeight-50){

            y=window.innerHeight-50;
            angle=-angle;

        }

        el.style.left=x+"px";

        el.style.top=y+"px";

        el.style.transform=
        dx<0
        ?"scaleX(-1)"
        :"scaleX(1)";

        requestAnimationFrame(animate);

    }

    animate();

}


</script>

</body>
</html>
