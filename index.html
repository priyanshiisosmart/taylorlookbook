<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kirang+Haerang&family=Cinzel&family=UnifrakturMaguntia&family=Space+Mono&family=Libre+Baskerville:ital@1&family=Pacifico&family=Dancing+Script:wght@700&family=Special+Elite&family=Playfair+Display:ital@1&family=Pinyon+Script&family=Abril+Fatface&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Kirang Haerang", sans-serif;
      font-size: 25px;
      cursor: none;
      background: #fff;
      margin: 0;
      overflow-x: hidden;
    }

    .cursor-pic {
      position: fixed;
      width: 70px;
      height: auto;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* ── BUTTERFLY ── */
    .butterfly {
      position: fixed;
      pointer-events: none;
      z-index: 8000;
      width: 48px;
      height: 48px;
      opacity: 0.75;
    }

    .wing-left {
      transform-origin: 100% 50%;
      animation: flapLeft 0.7s ease-in-out infinite alternate;
    }

    .wing-right {
      transform-origin: 0% 50%;
      animation: flapRight 0.7s ease-in-out infinite alternate;
    }

    @keyframes flapLeft {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0.15); }
    }

    @keyframes flapRight {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0.15); }
    }

    /* ── GLITTER ── */
    .glitter {
      position: fixed;
      pointer-events: none;
      z-index: 9997;
      animation: glitterShimmer 0.55s ease-out forwards;
    }

    @keyframes glitterShimmer {
      0%   { opacity: 1; transform: scale(1.5) translate(0,0) rotate(0deg); }
      40%  { opacity: 0.8; transform: scale(2) translate(var(--tx), var(--ty)) rotate(90deg); }
      100% { opacity: 0; transform: scale(0) translate(var(--tx), var(--ty)) rotate(200deg); }
    }

    /* ── BRACELET SIDEBAR ── */
    .bracelet-sidebar {
      position: fixed;
      right: 0;
      top: 0;
      width: 55px;
      background: #fff0f6;
      border-left: 2px dashed mediumvioletred;
      border-bottom: 2px dashed mediumvioletred;
      border-radius: 0 0 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 1000;
      padding: 8px 0 10px;
    }

    .bracelet-sidebar p {
      font-size: 7px;
      color: mediumvioletred;
      text-align: center;
      margin: 0 0 2px;
    }

    .bracelet-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: none;
    }

    .bracelet-option img {
      width: 34px;
      height: 34px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border 0.2s, transform 0.2s;
    }

    .bracelet-option img:hover    { transform: scale(1.15); border: 2px solid mediumvioletred; }
    .bracelet-option img.selected { border: 2px solid mediumvioletred; box-shadow: 0 0 6px mediumvioletred; }

    .bracelet-option span {
      font-size: 7px;
      color: mediumvioletred;
      font-family: "Kirang Haerang", sans-serif;
    }

    /* ── ERA IMAGES ── */
    .era-img-wrap {
      display: inline-block;
      position: relative;
    }

    .era-img {
      width: 300px;
      height: 300px;
      cursor: none;
      display: block;
    }

    /* ── ALBUM LABEL ── */
    .album-label {
      display: none;
      position: absolute;
      top: 50%;
      right: -135px;
      transform: translateY(-50%);
      padding: 6px 14px;
      border-radius: 8px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      font-size: 22px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
      width: 120px;
      text-align: center;
      animation: labelPop 0.25s ease-out;
    }

    @keyframes labelPop {
      from { opacity: 0; transform: translateY(-50%) translateX(-6px); }
      to   { opacity: 1; transform: translateY(-50%) translateX(0); }
    }

    .era-img-wrap:hover .album-label { display: block; }

    /* ── POPUP ── */
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9998;
    }

    .overlay.active { display: block; }

    .floating-title {
      position: fixed;
      font-size: 28px;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 0 20px rgba(255,255,255,0.9), 0 2px 8px rgba(0,0,0,0.4);
      animation: titlePop 0.3s ease-out;
      z-index: 9999;
      transform: translate(-50%, -120%);
    }

    @keyframes titlePop {
      from { opacity: 0; transform: translate(-50%, -100%) scale(0.8); }
      to   { opacity: 1; transform: translate(-50%, -120%) scale(1); }
    }

    .close-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: mediumvioletred;
      opacity: 0.6;
      z-index: 9999;
      pointer-events: none;
    }
  </style>
</head>

      <span class="era-img-wrap"><img class="era-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcStP7nR--NkdBTMFxW08HuPkMOPgFiGwCY69D232rWBew&s=10" alt="red" onclick="openPopup(event,'Red','Abril Fatface','#ff6b6b')"><span class="album-label" style="color:#ff6b6b;font-family:'Abril Fatface'">Red</span></span>
      <span class="era-img-wrap"><img class="era-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-8whpZuoTHKH9IwFsjcavnFiumJ0IyLn7AvtVcbsHLw&s=10" alt="speak now" onclick="openPopup(event,'Speak Now','Pinyon Script','#c084fc')"><span class="album-label" style="color:#c084fc;font-family:'Pinyon Script';font-size:26px">Speak Now</span></span>
      <span class="era-img-wrap"><img class="era-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTI8aD2c-gpVI2qe-AiA_IRiZPqRj3HrOjcFhJZvwoVMv0a2KH62XP_yP8&s=10" alt="fearless" onclick="openPopup(event,'Fearless','Dancing Script','#fcd34d')"><span class="album-label" style="color:#fcd34d;font-family:'Dancing Script';font-size:26px">Fearless</span></span>
      <span class="era-img-wrap"><img class="era-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvV3kjWW0NpeARcQkdh1aBDX46QmOxOoy5_7QMnAy5IRJypSWnA4q9MjVY&s=100" alt="debut" onclick="openPopup(event,'Taylor Swift','Pacifico','#6ee7b7')"><span class="album-label" style="color:#6ee7b7;font-family:'Pacifico';font-size:15px">Taylor Swift</span></span>
    </marquee>
  </p>

  <script>
    // ── CURSOR ──
    const follower = document.getElementById('follower');
    window.addEventListener('mousemove', (e) => {
      follower.style.left = e.clientX + 'px';
      follower.style.top  = e.clientY + 'px';
    });

    function setCursor(clickedImg, src) {
      document.querySelectorAll('.bracelet-option img').forEach(img => img.classList.remove('selected'));
      clickedImg.classList.add('selected');
      follower.src = src;
    }

    // ── POPUP ──
    let popupOpen = false;
    function openPopup(e, title, font, color) {
      e.stopPropagation();
      if (popupOpen) { closePopup(); return; }
      const rect = e.target.getBoundingClientRect();
      const t = document.getElementById('floating-title');
      t.textContent = title;
      t.style.fontFamily = font + ', sans-serif';
      t.style.color = color;
      t.style.left = (rect.left + rect.width / 2) + 'px';
      t.style.top  = rect.top + 'px';
      document.getElementById('overlay').classList.add('active');
      popupOpen = true;
    }

    function closePopup() {
      document.getElementById('overlay').classList.remove('active');
      popupOpen = false;
    }

    // ── SILVER GLITTER ──
    const glitterColors = ['#e8e8e8','#d4d4d4','#ffffff','#c0c0c0','#f0f0f0','#b8b8d0','#ececff'];

    document.addEventListener('mouseover', (e) => {
      if (!e.target.classList.contains('era-img')) return;
      clearInterval(window._glitterInterval);
      window._glitterInterval = setInterval(() => {
        const rect = e.target.getBoundingClientRect();
        for (let i = 0; i < 4; i++) {
          const g = document.createElement('div');
          g.className = 'glitter';
          const size = Math.random() * 3 + 2;
          g.style.width  = size + 'px';
          g.style.height = size + 'px';
          g.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          g.style.background = glitterColors[Math.floor(Math.random() * glitterColors.length)];
          g.style.boxShadow = `0 0 ${size + 2}px #fff, 0 0 ${size}px #ddd`;
          const gx = rect.left + Math.random() * 60;
          const gy = rect.top  + Math.random() * 60;
          g.style.left = gx + 'px';
          g.style.top  = gy + 'px';
          const burstAngle = Math.random() * Math.PI * 2;
          const burstDist  = Math.random() * 12 + 4;
          g.style.setProperty('--tx', Math.cos(burstAngle) * burstDist + 'px');
          g.style.setProperty('--ty', Math.sin(burstAngle) * burstDist + 'px');
          document.body.appendChild(g);
          setTimeout(() => g.remove(), 550);
        }
      }, 70);
    });

    document.addEventListener('mouseout', (e) => {
      if (e.target.classList.contains('era-img')) {
        clearInterval(window._glitterInterval);
      }
    });

    // ── BUTTERFLIES - spread across all 4 quadrants ──
    function createButterfly(id, startX, startY, speedMult) {
      const el = document.getElementById(id);
      let bx = startX;
      let by = startY;
      let angle = Math.random() * Math.PI * 2;
      const speed = (0.3 + Math.random() * 0.25) * speedMult;
      let zigTimer = Math.random() * 100;
      let turnTimer = 0;
      // More frequent random turns for more random movement
      let turnInterval = 40 + Math.floor(Math.random() * 90);

      function fly() {
        zigTimer += 0.035;
        turnTimer++;

        // Random direction change - more frequent and wider turns
        if (turnTimer >= turnInterval) {
          angle += (Math.random() - 0.5) * 2.8;
          turnInterval = 40 + Math.floor(Math.random() * 90);
          turnTimer = 0;
        }

        // Occasional sharp random turn for unpredictability
        if (Math.random() < 0.004) {
          angle += (Math.random() - 0.5) * Math.PI;
        }

        const zigzag = Math.sin(zigTimer * 3.5) * 1.4;
        const perpX  = -Math.sin(angle) * zigzag;
        const perpY  =  Math.cos(angle) * zigzag;

        bx += Math.cos(angle) * speed + perpX;
        by += Math.sin(angle) * speed + perpY;

        // Soft bounce off edges
        if (bx < 20) { bx = 20; angle = Math.PI - angle + (Math.random()-0.5)*0.5; }
        if (bx > window.innerWidth  - 60) { bx = window.innerWidth  - 60; angle = Math.PI - angle + (Math.random()-0.5)*0.5; }
        if (by < 20) { by = 20; angle = -angle + (Math.random()-0.5)*0.5; }
        if (by > window.innerHeight - 60) { by = window.innerHeight - 60; angle = -angle + (Math.random()-0.5)*0.5; }

        el.style.left = bx + 'px';
        el.style.top  = by + 'px';
        el.style.transform = Math.cos(angle) < 0 ? 'scaleX(-1)' : 'scaleX(1)';

        requestAnimationFrame(fly);
      }

      fly();
    }

    // Start each butterfly in a different quadrant so they spread out
    const W = window.innerWidth;
    const H = window.innerHeight;
    createButterfly('butterfly1', W * 0.1 + Math.random() * W * 0.3,  H * 0.1 + Math.random() * H * 0.3,  1.0);
    createButterfly('butterfly2', W * 0.6 + Math.random() * W * 0.3,  H * 0.1 + Math.random() * H * 0.3,  0.85);
    createButterfly('butterfly3', W * 0.1 + Math.random() * W * 0.3,  H * 0.6 + Math.random() * H * 0.3,  0.9);
    createButterfly('butterfly4', W * 0.6 + Math.random() * W * 0.3,  H * 0.6 + Math.random() * H * 0.3,  0.95);
  </script>

</body>
</html>
