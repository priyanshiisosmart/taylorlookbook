padding:0;

height:100%;
overflow-x:hidden;

/* ---------- TITLE ---------- */

h1{

margin:25px 0 15px 20px;

color:mediumvioletred;

font-size:46px;

text-align:left;

}


/* ---------- CURSOR ---------- */
.cursor-pic{
    position:fixed;
    width:55px;
    height:55px;
    pointer-events:none;
    z-index:99999;
    transform:translate(-50%,-50%);
    left:50%;
    top:50%;
}


/* ---------- STATIC BUTTERFLIES ---------- */

.butterfly{

position:fixed;

pointer-events:none;

z-index:5;

opacity:.9;

}

.butterfly img{

width:70px;

height:auto;

}


/* ---------- GLITTER ---------- */

.glitter{

position:fixed;

pointer-events:none;

z-index:99999;

animation:glitter .55s ease-out forwards;

}

@keyframes glitter{

0%{
opacity:1;
transform:scale(1.3) translate(0,0);
}

100%{
opacity:0;
transform:scale(0)
translate(var(--tx),var(--ty));
}

}

/* ---------- TOOLBARS ---------- */

.top-controls{

display:flex;

justify-content:space-between;

align-items:flex-start;

padding:0 18px;

margin-bottom:20px;

}


/* ---------- BRACELET ---------- */

.bracelet-sidebar{

display:flex;

gap:12px;

align-items:center;

background:#fff0f6;

padding:10px 14px;

border-radius:14px;

border:2px dashed mediumvioletred;

}

.bracelet-option{

display:flex;

flex-direction:column;

align-items:center;

cursor:none;

}

.bracelet-option img{

width:42px;

height:42px;

object-fit:cover;

border-radius:50%;

border:2px solid transparent;

transition:.25s;

}

.bracelet-option img:hover{

transform:scale(1.15);

border-color:mediumvioletred;

}

.bracelet-option img.selected{

border-color:mediumvioletred;

box-shadow:0 0 10px mediumvioletred;

}

.bracelet-option span{

font-size:9px;

color:mediumvioletred;

}


/* ---------- GLITTER COLORS ---------- */

.glitter-sidebar{

display:flex;

gap:10px;

align-items:center;

background:#fff0f6;

padding:10px 14px;

border-radius:14px;

border:2px dashed mediumvioletred;

}

.color-btn{

width:30px;

height:30px;

border-radius:50%;

cursor:pointer;

border:2px solid white;

transition:.2s;

}

.color-btn:hover{

transform:scale(1.2);

}


/* ---------- ERA IMAGES ---------- */

.era-img{

width:300px;

height:300px;

object-fit:cover;

cursor:none;

display:block;

}

.era-img-wrap{

position:relative;

display:inline-block;

margin:0 10px;

}


/* ---------- LABEL ---------- */

.album-label{

display:none;

position:absolute;

top:50%;

right:-135px;

transform:translateY(-50%);

padding:8px 14px;

background:rgba(0,0,0,.55);

backdrop-filter:blur(5px);

border-radius:8px;

font-size:22px;

white-space:nowrap;

pointer-events:none;

}

.era-img-wrap:hover .album-label{

display:block;

}


/* ---------- POPUP ---------- */

.overlay{

display:none;

position:fixed;

inset:0;

z-index:9998;

}

.overlay.active{

display:block;

}

.floating-title{

position:fixed;

transform:translate(-50%,-120%);

font-size:28px;

pointer-events:none;

white-space:nowrap;

text-shadow:

0 0 20px white,

0 0 8px white;

}

.close-hint{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

font-size:12px;

color:mediumvioletred;

.settings-toggle{

//================ SETTINGS =================

function toggleSettings(){

document.getElementById("topControls").classList.toggle("show");

}


//================ CURSOR =================

cconst follower = document.getElementById("follower");

document.addEventListener("mousemove", function(e){

    follower.style.left = e.clientX + "px";
    follower.style.top = e.clientY + "px";

    sparkle(e.clientX,e.clientY);

});

document.addEventListener("touchmove", function(e){

    const touch = e.touches[0];

    follower.style.left = touch.clientX + "px";
    follower.style.top = touch.clientY + "px";

    sparkle(touch.clientX,touch.clientY);

},{passive:true});


//================ CURSOR CHANGE =================

function setCursor(img,src){

document.querySelectorAll(".bracelet-option img")
.forEach(i=>i.classList.remove("selected"));

img.classList.add("selected");

follower.src=src;

}



//================ GLITTER =================

let glitterColor = "white";

function sparkle(x,y){

    for(let i=0;i<3;i++){

        const s=document.createElement("div");

        s.className="glitter";

        const size=2+Math.random()*4;

        s.style.width=size+"px";
        s.style.height=size+"px";

        s.style.left=(x+(Math.random()*20-10))+"px";
        s.style.top=(y+(Math.random()*20-10))+"px";

        s.style.borderRadius="50%";

        s.style.background=glitterColor;

        s.style.boxShadow=
        `0 0 5px ${glitterColor},
         0 0 12px white`;

        s.style.setProperty("--tx",(Math.random()*20-10)+"px");
        s.style.setProperty("--ty",(Math.random()*20-10)+"px");

        document.body.appendChild(s);

        setTimeout(()=>{
            s.remove();
        },550);

    }

}



//============== EXTRA MOBILE SPARKLES ==============

window.addEventListener("scroll",()=>{

if(window.innerWidth>768)return;

const x=window.innerWidth*0.5;

//================ POPUP =================

let popupOpen=false;

function openPopup(e,title,font,color){

e.stopPropagation();

const rect=e.target.getBoundingClientRect();

const popup=document.getElementById("floating-title");

popup.innerHTML=title;

popup.style.fontFamily=font;

popup.style.color=color;

popup.style.left=(rect.left+rect.width/2)+"px";

popup.style.top=rect.top+"px";

document.getElementById("overlay")
.classList.add("active");

popupOpen=true;

}


function closePopup(){

document.getElementById("overlay")
.classList.remove("active");

popupOpen=false;

}

</script>
