<style>

/* ===========================
RESET
=========================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

background:#fff8fc;

font-family:"Kirang Haerang",cursive;

overflow-x:hidden;

cursor:none;

min-height:100vh;

}


/* ===========================
TITLE
=========================== */

h1{

position:fixed;

top:20px;

left:20px;

font-size:42px;

color:mediumvioletred;

z-index:1000;

letter-spacing:1px;

text-shadow:
0 0 8px rgba(255,255,255,.7);

}


/* ===========================
TOP TOOLBARS
=========================== */

.top-controls{

position:fixed;

top:18px;

right:18px;

display:flex;

align-items:flex-start;

gap:14px;

z-index:10000;

}


/* ===========================
BRACELET SIDEBAR
=========================== */

.bracelet-sidebar{

display:flex;

gap:10px;

padding:8px 12px;

background:rgba(255,240,246,.92);

backdrop-filter:blur(8px);

border-radius:18px;

border:2px dashed mediumvioletred;

}

.bracelet-option{

display:flex;

flex-direction:column;

align-items:center;

gap:4px;

cursor:none;

}

.bracelet-option img{

width:46px;

height:46px;

object-fit:cover;

border-radius:50%;

border:2px solid transparent;

transition:.25s;

}

.bracelet-option img:hover{

transform:scale(1.12);

border-color:mediumvioletred;

}

.bracelet-option img.selected{

border-color:mediumvioletred;

box-shadow:0 0 10px mediumvioletred;

}

.bracelet-option span{

font-size:10px;

color:mediumvioletred;

}


/* ===========================
GLITTER PICKER
=========================== */

.glitter-sidebar{

display:flex;

gap:10px;

padding:8px 12px;

background:rgba(255,240,246,.92);

backdrop-filter:blur(8px);

border-radius:18px;

border:2px dashed mediumvioletred;

}

.color-btn{

width:24px;

height:24px;

border-radius:50%;

cursor:none;

border:2px solid white;

box-shadow:0 0 6px rgba(0,0,0,.2);

transition:.2s;

}

.color-btn:hover{

transform:scale(1.15);

}


/* ===========================
CURSOR BRACELET
=========================== */

.cursor-pic{

position:fixed;

width:56px;

height:56px;

pointer-events:none;

z-index:99999;

transform:translate(-50%,-50%);

left:50%;

top:50%;

}


/* ===========================
GLITTER
=========================== */

.glitter{

position:fixed;

pointer-events:none;

z-index:99998;

animation:glitter .65s ease-out forwards;

}

@keyframes glitter{

0%{

opacity:1;

transform:scale(1.4) translate(0,0);

}

100%{

opacity:0;

transform:scale(0)
translate(var(--tx),var(--ty));

}

}


/* ===========================
BUTTERFLIES
=========================== */

.butterfly{

position:fixed;

width:60px;

pointer-events:none;

z-index:20;

animation:floatButterfly 10s ease-in-out infinite alternate;

}

.butterfly img{

width:100%;

display:block;

}

@keyframes floatButterfly{

0%{
transform:translate(0,0) rotate(-5deg);
}

25%{
transform:translate(18px,-8px) rotate(4deg);
}

50%{
transform:translate(-12px,16px) rotate(-3deg);
}

75%{
transform:translate(14px,-10px) rotate(5deg);
}

100%{
transform:translate(-10px,10px) rotate(-5deg);
}

}


/* ===========================
MOBILE
=========================== */

.settings-toggle{

display:none;

}

@media(max-width:768px){

h1{

font-size:28px;

left:12px;

top:12px;

max-width:58%;

}

.top-controls{

top:10px;

right:10px;

transform:scale(.88);

transform-origin:top right;

}

.bracelet-option img{

width:38px;

height:38px;

}

.color-btn{

width:20px;

height:20px;

}

.cursor-pic{

width:46px;

height:46px;

}

.butterfly{

width:44px;

}

}

@media(max-width:540px){

.top-controls{

display:none;

flex-direction:column;

align-items:flex-end;

gap:8px;

}

.top-controls.show{

display:flex;

}

.settings-toggle{

display:block;

position:fixed;

top:12px;

right:12px;

width:48px;

height:48px;

border:none;

border-radius:50%;

background:#fff0f6;

font-size:24px;

z-index:10001;

box-shadow:0 4px 12px rgba(0,0,0,.15);

}

}.lookbook{

margin-top:120px;

overflow:hidden;

width:100%;

}

.scroll-track{

overflow:hidden;

white-space:nowrap;

margin:35px 0;

}

.scroll-content{

display:inline-flex;

gap:30px;

animation:scrollLeft 40s linear infinite;

}

.scroll-track.reverse .scroll-content{

animation:scrollRight 40s linear infinite;

}

@keyframes scrollLeft{

from{
transform:translateX(0);
}

to{
transform:translateX(-50%);
}

}

@keyframes scrollRight{

from{
transform:translateX(-50%);
}

to{
transform:translateX(0);
}

}

.era-img-wrap{

position:relative;

display:inline-block;

flex-shrink:0;

}

.era-img{

width:290px;

height:290px;

object-fit:cover;

border-radius:16px;

cursor:none;

transition:.35s;

}

.era-img:hover{

transform:scale(1.05);

}

.album-label{

position:absolute;

right:-135px;

top:50%;

transform:translateY(-50%);

display:none;

padding:8px 14px;

background:rgba(0,0,0,.55);

backdrop-filter:blur(6px);

border-radius:10px;

font-size:22px;

white-space:nowrap;

}

.era-img-wrap:hover .album-label{

display:block;

}

.overlay{

position:fixed;

inset:0;

display:none;

z-index:99997;

}

.overlay.active{

display:block;

}

.floating-title{

position:absolute;

font-size:32px;

transform:translate(-50%,-120%);

text-shadow:0 0 15px white;

pointer-events:none;

}

@media(max-width:768px){

.lookbook{

margin-top:90px;

}

.scroll-content{

gap:16px;

animation-duration:28s;

}

.era-img{

width:180px;

height:180px;

}

.album-label{

display:none;

}

}

<script>

/* ==========================================================
   MOBILE SETTINGS BUTTON
========================================================== */

function toggleSettings() {
    document.getElementById("topControls").classList.toggle("show");
}

/* ==========================================================
   CURSOR FOLLOWER
========================================================== */

const follower = document.getElementById("follower");

function moveFollower(x, y) {
    follower.style.left = x + "px";
    follower.style.top = y + "px";
}

/* ==========================================================
   BRACELET PICKER
========================================================== */

function setCursor(clickedImg, src) {

    document
        .querySelectorAll(".bracelet-option img")
        .forEach(img => img.classList.remove("selected"));

    clickedImg.classList.add("selected");

    follower.src = src;

}

/* ==========================================================
   GLITTER COLOUR PICKER
========================================================== */

let glitterColor = "#ffffff";

function setGlitterColor(color) {

    glitterColor = color;

}

/* ==========================================================
   GLITTER
========================================================== */

function sparkle(x, y) {

    const amount = window.innerWidth < 768 ? 6 : 3;

    for (let i = 0; i < amount; i++) {

        const s = document.createElement("div");

        s.className = "glitter";

        const size = 2 + Math.random() * 4;

        s.style.width = size + "px";
        s.style.height = size + "px";

        s.style.left =
            (x + Math.random() * 20 - 10) + "px";

        s.style.top =
            (y + Math.random() * 20 - 10) + "px";

        s.style.borderRadius = "50%";

        s.style.background = glitterColor;

        s.style.boxShadow =
            `0 0 4px ${glitterColor},
             0 0 8px ${glitterColor},
             0 0 14px white`;

        s.style.setProperty(
            "--tx",
            (Math.random() * 18 - 9) + "px"
        );

        s.style.setProperty(
            "--ty",
            (Math.random() * 18 - 9) + "px"
        );

        document.body.appendChild(s);

        setTimeout(() => {

            s.remove();

        }, 600);

    }

}

/* ==========================================================
   DESKTOP
========================================================== */

document.addEventListener("mousemove", e => {

    moveFollower(e.clientX, e.clientY);

    sparkle(e.clientX, e.clientY);

});

/* ==========================================================
   MOBILE
========================================================== */

document.addEventListener("touchstart", e => {

    const t = e.touches[0];

    moveFollower(t.clientX, t.clientY);

    sparkle(t.clientX, t.clientY);

}, { passive: true });

document.addEventListener("touchmove", e => {

    const t = e.touches[0];

    moveFollower(t.clientX, t.clientY);

    sparkle(t.clientX, t.clientY);

}, { passive: true });

/* ==========================================================
   MOBILE SCROLL GLITTER
========================================================== */

window.addEventListener("scroll", () => {

    if (window.innerWidth > 768) return;

    sparkle(

        window.innerWidth * 0.5,

        window.innerHeight * 0.75

    );

}, { passive: true });

/* ==========================================================
   POPUP
========================================================== */

function openPopup(e, title, font, color) {

    e.stopPropagation();

    const rect = e.target.getBoundingClientRect();

    const popup = document.getElementById("floating-title");

    popup.textContent = title;

    popup.style.fontFamily = font;

    popup.style.color = color;

    popup.style.left =
        rect.left + rect.width / 2 + "px";

    popup.style.top =
        rect.top + "px";

    document
        .getElementById("overlay")
        .classList.add("active");

}

function closePopup() {

    document
        .getElementById("overlay")
        .classList.remove("active");

}

/* ==========================================================
   PAUSE CAROUSEL
========================================================== */

document
.querySelectorAll(".scroll-content")
.forEach(track => {

    track.addEventListener("mouseenter", () => {

        track.style.animationPlayState = "paused";

    });

    track.addEventListener("mouseleave", () => {

        track.style.animationPlayState = "running";

    });

});

/* ==========================================================
   BUTTERFLIES
========================================================== */

document
.querySelectorAll(".butterfly")
.forEach((b, i) => {

    b.style.animationDuration =
        (8 + i * 2) + "s";

    b.style.animationDelay =
        (i * 1.4) + "s";

});

/* ==========================================================
   RESET CURSOR POSITION
========================================================== */

window.addEventListener("resize", () => {

    follower.style.left = "50vw";

    follower.style.top = "50vh";

});

</script>

</body>
